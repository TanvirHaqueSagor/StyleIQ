name: styleiq
description: "AI-powered personal style intelligence platform."
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # UI & Animations
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  confetti: ^0.7.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0
  flutter_staggered_animations: ^1.1.1

  # Images
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  image_picker: ^1.0.7
  image: ^4.2.0
  image_cropper: ^5.0.1
  screenshot: ^3.0.0

  # Networking
  http: ^1.2.0
  dio: ^5.4.0

  # Firebase & Auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.1.0
  url_launcher: ^6.2.4

  # State
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9

  # Camera & AR
  camera: ^0.11.0
  google_mlkit_face_detection: ^0.12.0
  permission_handler: ^11.3.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  share_plus: ^7.2.2

  # Payments
  flutter_stripe: ^10.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/prompts/
